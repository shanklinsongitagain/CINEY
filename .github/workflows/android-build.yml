name: Android Firestick Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          sdkmanager --licenses || true

      - name: Restore debug keystore cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: ciney-debug-keystore-v1

      - name: Create environment file
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME="${APP_VERSION}-firestick.${VERSION_CODE}"
          cat <<EOF > .env
          VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}
          VITE_PLAYER_BASE_URL=${{ secrets.VITE_PLAYER_BASE_URL }}
          VITE_PLAYER_ALLOWED_ORIGIN=${{ secrets.VITE_PLAYER_ALLOWED_ORIGIN }}
          VITE_GITHUB_REPO=${{ github.repository }}
          VITE_APP_VERSION=${VERSION_NAME}
          EOF
          echo "CINEY_VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "CINEY_VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV

      - name: Create Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode release keystore
        if: ${{ secrets.CINEY_RELEASE_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.CINEY_RELEASE_KEYSTORE_BASE64 }}" | base64 --decode > android/ciney-release.keystore
          echo "CINEY_RELEASE_STORE_FILE=/home/runner/work/CINEY/CINEY/android/ciney-release.keystore" >> $GITHUB_ENV
          echo "CINEY_RELEASE_STORE_PASSWORD=${{ secrets.CINEY_RELEASE_STORE_PASSWORD }}" >> $GITHUB_ENV
          echo "CINEY_RELEASE_KEY_ALIAS=${{ secrets.CINEY_RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "CINEY_RELEASE_KEY_PASSWORD=${{ secrets.CINEY_RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci

      - name: Run release sanity checks
        run: npm run sanity:release

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npm run android:sync

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug --stacktrace --warning-mode all

      - name: Upload Gradle reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-reports
          path: |
            android/app/build/reports
            android/build/reports
            android/.gradle
          if-no-files-found: ignore

      - name: Delete existing release tag (allow re-publish)
        run: |
          gh release delete latest-firestick-build --yes || true
          git push --delete origin latest-firestick-build || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-firestick-build
          name: Latest Firestick Build
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            Automated Firestick-ready debug APK built from the latest push to main.

            **Install on Firestick:**
            1. Open the Downloader app
            2. Enter the short URL from `npm run get-link`
            3. Install the APK and enjoy Ciney!

            **Build details:**
            - Android version name: `${{ env.CINEY_VERSION_NAME }}`
            - Android version code: `${{ env.CINEY_VERSION_CODE }}`
            - Build type: `debug`

            **Smoke verification checklist:**
            - [ ] APK installs cleanly on Firestick
            - [ ] Home rails are navigable with D-pad
            - [ ] Playback starts for movie and TV title
            - [ ] Progress resumes after exiting/reopening playback
            - [ ] Back button exits fullscreen then returns safely
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
