name: Android Firestick Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          sdkmanager --licenses || true

      - name: Restore debug keystore cache
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: ciney-debug-keystore-v1

      - name: Create environment file
        run: |
          cat <<EOF > .env
          VITE_TMDB_API_KEY=${{ secrets.VITE_TMDB_API_KEY }}
          VITE_PLAYER_BASE_URL=${{ secrets.VITE_PLAYER_BASE_URL }}
          VITE_PLAYER_ALLOWED_ORIGIN=${{ secrets.VITE_PLAYER_ALLOWED_ORIGIN }}
          VITE_GITHUB_REPO=${{ github.repository }}
          VITE_APP_VERSION=latest-firestick-build
          EOF

      - name: Create Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Install dependencies
        run: npm ci

      - name: Run release sanity checks
        run: npm run sanity:release

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor Android
        run: npm run android:sync

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew --no-daemon assembleDebug --stacktrace

      - name: Delete existing release tag (allow re-publish)
        run: |
          gh release delete latest-firestick-build --yes || true
          git push --delete origin latest-firestick-build || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-firestick-build
          name: Latest Firestick Build
          files: android/app/build/outputs/apk/debug/app-debug.apk
          body: |
            Automated Firestick-ready debug APK built from the latest push to main.

            **Install on Firestick:**
            1. Open the Downloader app
            2. Enter the short URL from `npm run get-link`
            3. Install the APK and enjoy Ciney!

            **Smoke verification checklist:**
            - [ ] APK installs cleanly on Firestick
            - [ ] Home rails are navigable with D-pad
            - [ ] Playback starts for movie and TV title
            - [ ] Progress resumes after exiting/reopening playback
            - [ ] Back button exits fullscreen then returns safely
          make_latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
